<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
    <link id="light" rel="stylesheet" href="assets/css/stylesheet.css">
    <title>Maximilian Fuksik - Kontakt</title>
</head>
<body>
<!-- HEAD -->
<header>
    <img src="assets/images/trees-8563877_1920.jpg" class="header-image" alt="Header image with trees">
    <div class="header-content">
        <div class="icon"></div>
        <div id="nav">
            <nav>
                <ul id="nav-links">
                </ul>
            </nav>
        </div>
    </div>
    <div id="clock">
        <div class="time">
            <span id="hours"></span><span class="separator">:</span>
            <span id="minutes"></span><span class="separator">:</span>
            <span id="seconds"></span>
        </div>
        <div id="date"></div>
    </div>
</header>

<div class="container">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="widget search-widget">
            <h3 id="search-title"></h3>
            <span class="search-icon"></span>
            <input type="text" id="json-search" placeholder="">
        </div>

        <div class="widget">
            <h3 id="links-title"></h3>
            <div id="social-links" class="profile-links"></div>
        </div>
        
        <div class="widget">
            <h3 id="contact-title"></h3>
            <div id="json-contact"></div>
        </div>

        <div class="widget">
            <h3 id="interests-title"></h3>
            <div id="json-interests">
                <p class="json-loading"></p>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT - WORK IN PROGRESS -->
    <main class="content">
        <div class="wip-container">
            <h2>📧 Kontakt</h2>
            <div class="wip-box">
                <div class="wip-icon">🚧</div>
                <h3>Work in Progress</h3>
                <p>Diese Seite befindet sich noch im Aufbau.</p>
                <p>Bis dahin erreichst du mich per E-Mail:</p>
                <p><strong>maximilianfuksik@gmail.com</strong></p>
                <hr>
                <p>📞 Telefon: <strong>01516 1859480</strong></p>
            </div>
        </div>
    </main>
</div>

<!-- FOOTER - Dynamic from config.json -->
<footer>
    <p id="footer-links">
        <!-- Dynamic footer links from config.json -->
    </p>
</footer>

<script src="assets/js/cv-loader.js"></script>
<script src="assets/js/script.js"></script>

</body>
</html>
