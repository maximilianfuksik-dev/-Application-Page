<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
    <link id="light" rel="stylesheet" href="assets/css/stylesheet.css">
    <title>Maximilian Fuksik - Lebenslauf</title>
</head>
<body>
<!-- HEADER -->
<header>
    <img src="assets/images/trees-8563877_1920.jpg" class="header-image" alt="Header image with trees">
    <div class="header-content">
        <div class="icon"></div>
        <div id="nav">
            <nav>
                <ul id="nav-links">
                    <!-- Dynamic navigation from config.json -->
                </ul>
            </nav>
        </div>
    </div>
    <div id="clock">
        <div class="time">
            <span id="hours"></span><span class="separator">:</span>
            <span id="minutes"></span><span class="separator">:</span>
            <span id="seconds"></span>
        </div>
        <div id="date"></div>
    </div>
</header>

<!-- HAUPT-CONTAINER -->
<div class="container">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="widget search-widget">
            <h3 id="search-title"></h3>
            <span class="search-icon"></span>
            <input type="text" id="json-search" placeholder="">
        </div>

        <div class="widget">
            <h3 id="links-title"></h3>
            <div id="social-links" class="profile-links"></div>
        </div>
        
        <div class="widget">
            <h3 id="contact-title"></h3>
            <div id="json-contact"></div>
        </div>

        <div class="widget">
            <h3 id="interests-title"></h3>
            <div id="json-interests">
                <p class="json-loading"></p>
            </div>
        </div>
    </aside>

    <!-- CV-HAUPTINHALT -->
    <main class="cv-main"> 
        <!-- DOKUMENTE -->
        <div class="resume-documents">
            <h3 id="documents-title"></h3>
            <p id="documents-subtitle"></p>
            <div class="documents-grid" id="documents-grid">
                <p class="json-loading"></p>
            </div>
        </div>

        <br>
        
        <!-- PDF MODAL -->
        <div id="pdf-modal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <iframe id="modal-frame" src="" width="100%" height="600px"></iframe>
            </div>
        </div>

        <!-- BERUFSERFAHRUNG aus JSON -->
        <section class="work-experience-json">
            <h2 id="work-title"></h2>
            <div id="json-work-experience">
                <p class="json-loading"></p>
            </div>
        </section>

        <!-- AUSBILDUNG aus JSON -->
        <section class="education-json">
            <h2 id="education-title"></h2>
            <div id="json-education">
                <p class="json-loading"></p>
            </div>
        </section>

        <!-- FÄHIGKEITEN aus JSON -->
        <section class="skills-json">
            <h2 id="skills-json-title"></h2>
            <div id="json-skills">
                <p class="json-loading"></p>
            </div>
        </section>

        <!-- MANUELLE SKILLS (aus JSON geladen) -->
        <section class="skills-section">
            <h2 id="skills-title"></h2>

            <div class="skill-category">
                <h3 id="prog-lang-title"></h3>
                <div class="skills-grid" id="prog-lang-grid"></div>
            </div>

            <div class="skill-category">
                <h3 id="softskills-title"></h3>
                <div class="skills-grid" id="softskills-grid"></div>
            </div>

            <div class="skill-category">
                <h3 id="languages-title"></h3>
                <div class="skills-grid" id="languages-grid"></div>
            </div>

            <div class="skill-category">
                <h3 id="other-title"></h3>
                <div class="skills-grid" id="other-grid"></div>
            </div>
        </section>
   </main> 
</div>

<!-- FOOTER - Dynamic from config.json -->
<footer>
    <p id="footer-links">
        <!-- Dynamic footer links from config.json -->
    </p>
</footer>

<script src="assets/js/cv-loader.js"></script>
<script src="assets/js/script.js"></script>

</body>
</html>
