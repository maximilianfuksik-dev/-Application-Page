<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link id="light" rel="stylesheet" href="assets/css/stylesheet.css">
    <title>Maximilian Fuksik</title>
</head>
<body>
<!-- HEAD -->
<header>
    <img src="assets/images/trees-8563877_1920.jpg" class="header-image" alt="Header image with trees">
    <div class="header-content">
        <div class="icon"></div>
        <!-- Navigation Bar - Will be filled by config.json -->
        <div id="nav">
            <nav>
                <ul id="nav-links">
                    <!-- Dynamic navigation from cv-loader.js will go here -->
                </ul>
                
                <!-- Dark Mode Toggle - STATIC (only once in HTML) -->
                <li class="dark-mode-item">
                    <span id="dayNight"> 🔆 | ☾ </span>
                    <label class="darkMode" for="toggle-checkbox">
                        <input type="checkbox" id="toggle-checkbox">
                        <span class="d-btn"></span>
                    </label>
                </li>
            </nav>
        </div>
    </div>
    <!-- Clock -->
    <div id="clock">
        <div class="time">
            <span id="hours"></span><span class="separator">:</span>
            <span id="minutes"></span><span class="separator">:</span>
            <span id="seconds"></span>
        </div>
        <div id="date"></div>
    </div>
</header>

<!-- CONTAINER for everything -->
<div class="container">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="widget search-widget">
            <h3>Search</h3>
            <span class="search-icon"></span>
            <input type="text" id="json-search" placeholder="">
        </div>

        <!-- SOCIAL MEDIA / PROFILE LINKS - Dynamic from config.json -->
        <div class="widget">
            <h3>Links</h3>
            <div id="social-links" class="profile-links">
                <!-- Dynamic social links from config.json -->
            </div>
        </div>
        
        <div class="widget">
            <h3>Contact</h3>
            <div id="json-contact">
                <p>Email: <span class="json-email"></span></p>
                <p>Phone: <span class="json-phone"></span></p>
                <p>Address: <span class="json-address"></span></p>
                <p>Country: <span class="json-country"></span></p>
            </div>
        </div>

        <div class="widget">
            <h3>Interests</h3>
            <div id="json-interests">
                <p class="json-loading">Loading interests...</p>
            </div>
        </div>
    </aside>

    <!-- MAIN -->
    <main>
        <div class="welcome">
            <h1 id="welcome-title">Willkommen auf meiner Webseite</h1>
            <p id="welcome-text">Ich bin Maximilian Fuksik, und dies ist meine persönliche Webseite.</p>
        </div>

        <section class="about-section" id="about-section-container">
            <!-- Dynamic about sections from pageContent.json -->
        </section>
        
        <section class="gallery">
            <h2 id="gallery-title">Bildergalerie</h2>
            <div class="gallery-grid" id="gallery-grid">
                <div class="gallery-item"><img id="gallery-img-1" src="" alt="Bild 1"></div>
                <div class="gallery-item"><img id="gallery-img-2" src="" alt="Bild 2"></div>
                <div class="gallery-item"><img id="gallery-img-3" src="" alt="Bild 3"></div>
                <div class="gallery-item"><img id="gallery-img-4" src="" alt="Bild 4"></div>
                <div class="gallery-item"><img id="gallery-img-5" src="" alt="Bild 5"></div>
            </div>
        </section>
    </main>
</div>

<!-- FOOTER - Dynamic from config.json -->
<footer>
    <p id="footer-links">
        <!-- Dynamic footer links from config.json -->
    </p>
</footer>

<script src="assets/js/cv-loader.js"></script>
<script src="assets/js/script.js"></script>


</body>
</html>
